name: "Snowflake Setup"

# One-time workflow: creates the database, all marketplace schemas,
# SPCS infrastructure (compute pool, networking, image repo), and secrets.
# Run this ONCE on a new Snowflake account, then use snowflake-deploy.yml.
#
# Required GitHub Secrets:
#   SNOWFLAKE_ACCOUNT      - Account identifier (e.g. KYVOWCP-GXB23745)
#   SNOWFLAKE_USER         - Username
#   SNOWFLAKE_PRIVATE_KEY  - Full PEM contents of your RSA private key file
#
# Required GitHub Variables:
#   SNOWFLAKE_WAREHOUSE    - Warehouse name (e.g. COMPUTE_WH)
#   SNOWFLAKE_ROLE         - Role for containers (e.g. SYSADMIN)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm — this creates infrastructure on your Snowflake account"
        required: true
        type: string

jobs:
  setup:
    if: ${{ inputs.confirm == 'yes' }}
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE || 'COMPUTE_WH' }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE || 'SYSADMIN' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Write private key file
        env:
          SF_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          printenv SF_PRIVATE_KEY > /tmp/snowflake_key.p8
          chmod 600 /tmp/snowflake_key.p8

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          {
            echo '[connections.retail]'
            echo 'account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"'
            echo 'user = "${{ secrets.SNOWFLAKE_USER }}"'
            echo 'authenticator = "SNOWFLAKE_JWT"'
            echo 'private_key_file = "/tmp/snowflake_key.p8"'
            echo 'role = "ACCOUNTADMIN"'
            echo "warehouse = \"${SNOWFLAKE_WAREHOUSE}\""
            echo 'database = "RETAIL_ANALYZER"'
          } > ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Prepare setup SQL
        run: |
          PRIVATE_KEY_B64=$(base64 -w 0 /tmp/snowflake_key.p8)
          sed -i "s|<PASTE_YOUR_BASE64_PRIVATE_KEY_HERE>|${PRIVATE_KEY_B64}|g" spcs/setup.sql
          sed -i "s|COMPUTE_WH|${SNOWFLAKE_WAREHOUSE}|g" spcs/setup.sql

      - name: Run setup SQL
        run: snow sql --connection retail -f spcs/setup.sql

      - name: Get image repository URL
        run: |
          echo "==========================================="
          echo "  SETUP COMPLETE"
          echo "==========================================="
          echo ""
          echo "Image repository info:"
          snow sql --connection retail \
            -q "SHOW IMAGE REPOSITORIES IN SCHEMA RETAIL_ANALYZER.IMAGES"
          echo ""
          echo ">> Copy the repository_url from above and add it"
          echo ">> as the SNOWFLAKE_REGISTRY secret in GitHub."
          echo ""
          echo "Then run the 'Snowflake Deploy' workflow."

      - name: Clean up
        if: always()
        run: rm -f /tmp/snowflake_key.p8
