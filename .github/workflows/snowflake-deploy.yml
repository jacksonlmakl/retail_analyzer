name: "Snowflake Deploy"

# Builds all Docker images, pushes to Snowflake image registry,
# uploads the service spec, and creates or updates the SPCS service.
#
# Run after snowflake-setup.yml has been executed once.
# Re-run anytime you change scraper code to redeploy.
#
# All secrets and variables are read from the selected GitHub Environment
# (e.g. DEV, PROD). Configure them under Settings > Environments.
#
# Environment Secrets:
#   SNOWFLAKE_ACCOUNT      - Account identifier (e.g. KYVOWCP-GXB23745)
#   SNOWFLAKE_USER         - Username
#   SNOWFLAKE_PRIVATE_KEY  - Base64-encoded RSA private key (.p8)
#   SNOWFLAKE_REGISTRY     - Image repo URL (from SHOW IMAGE REPOSITORIES)
#
# Environment Variables:
#   SNOWFLAKE_WAREHOUSE    - Warehouse name (default: COMPUTE_WH)
#   SNOWFLAKE_ROLE         - Role for containers (default: SYSADMIN)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - DEV
          - PROD
        default: DEV
      action:
        description: "Deployment action"
        required: true
        type: choice
        options:
          - create
          - update
        default: create

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE || 'COMPUTE_WH' }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE || 'SYSADMIN' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Write private key file
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" | base64 -d > /tmp/snowflake_key.p8
          chmod 600 /tmp/snowflake_key.p8

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          {
            echo '[connections.retail]'
            echo 'account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"'
            echo 'user = "${{ secrets.SNOWFLAKE_USER }}"'
            echo 'authenticator = "SNOWFLAKE_JWT"'
            echo 'private_key_file = "/tmp/snowflake_key.p8"'
            echo 'role = "ACCOUNTADMIN"'
            echo "warehouse = \"${SNOWFLAKE_WAREHOUSE}\""
            echo 'database = "RETAIL_ANALYZER"'
          } > ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Snowflake image registry
        run: snow spcs image-registry login --connection retail

      - name: Build and push marketplace images
        env:
          REGISTRY: ${{ secrets.SNOWFLAKE_REGISTRY }}
        run: |
          SERVICES=(
            "google-shopping:google_shopping/Dockerfile"
            "grailed:grailed/Dockerfile"
            "vestiaire:vestiaire/Dockerfile"
            "rebag:rebag/Dockerfile"
            "farfetch:farfetch/Dockerfile"
            "fashionphile:fashionphile/Dockerfile"
            "secondstreet:secondstreet/Dockerfile"
          )

          for entry in "${SERVICES[@]}"; do
            NAME="${entry%%:*}"
            DOCKERFILE="${entry##*:}"
            TAG="${REGISTRY}/${NAME}:latest"

            echo "::group::Building ${NAME}"
            docker buildx build \
              --platform linux/amd64 \
              -f "${DOCKERFILE}" \
              -t "${TAG}" \
              --push \
              .
            echo "::endgroup::"
          done

      - name: Build and push Redis image
        env:
          REGISTRY: ${{ secrets.SNOWFLAKE_REGISTRY }}
        run: |
          REDIS_TAG="${REGISTRY}/redis:7-alpine"
          echo "FROM redis:7-alpine" | docker buildx build \
            --platform linux/amd64 \
            -t "${REDIS_TAG}" \
            --push \
            -

      - name: Generate service spec from template
        run: |
          sed -i "s/<YOUR_SNOWFLAKE_ACCOUNT>/${{ secrets.SNOWFLAKE_ACCOUNT }}/g" spcs/retail-analyzer.yaml
          sed -i "s/<YOUR_SNOWFLAKE_USER>/${{ secrets.SNOWFLAKE_USER }}/g" spcs/retail-analyzer.yaml
          sed -i "s/COMPUTE_WH/${SNOWFLAKE_WAREHOUSE}/g" spcs/retail-analyzer.yaml
          sed -i "s/SYSADMIN/${SNOWFLAKE_ROLE}/g" spcs/retail-analyzer.yaml

      - name: Upload service spec to Snowflake stage
        run: |
          snow sql --connection retail \
            -q "PUT 'file://$(pwd)/spcs/retail-analyzer.yaml' @RETAIL_ANALYZER.PUBLIC.SPCS_SPECS AUTO_COMPRESS=FALSE OVERWRITE=TRUE"

      - name: Create service (first deploy)
        if: ${{ inputs.action == 'create' }}
        run: |
          snow sql --connection retail -q "
            CREATE SERVICE IF NOT EXISTS RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC
              IN COMPUTE POOL SCRAPER_POOL
              FROM @RETAIL_ANALYZER.PUBLIC.SPCS_SPECS
              SPECIFICATION_FILE = 'retail-analyzer.yaml'
              EXTERNAL_ACCESS_INTEGRATIONS = (SCRAPER_EGRESS)
              MIN_INSTANCES = 1
              MAX_INSTANCES = 1;
          "

          snow sql --connection retail -q "
            GRANT SERVICE ROLE RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC!ALL_ENDPOINTS_USAGE
              TO ROLE ACCOUNTADMIN;
          "

          snow sql --connection retail -q "
            GRANT SERVICE ROLE RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC!ALL_ENDPOINTS_USAGE
              TO ROLE ${SNOWFLAKE_ROLE};
          "

      - name: Update service (redeploy)
        if: ${{ inputs.action == 'update' }}
        run: |
          snow sql --connection retail -q "
            ALTER SERVICE RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC SUSPEND;
          "
          echo "Waiting for service to suspend..."
          sleep 15

          snow sql --connection retail -q "
            ALTER SERVICE RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC
              FROM @RETAIL_ANALYZER.PUBLIC.SPCS_SPECS
              SPECIFICATION_FILE = 'retail-analyzer.yaml';
          "

          snow sql --connection retail -q "
            ALTER SERVICE RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC RESUME;
          "

      - name: Check service status
        run: |
          echo "Waiting 30s for containers to start..."
          sleep 30

          echo "=== Service Status ==="
          snow sql --connection retail -q "
            SELECT SYSTEM\$GET_SERVICE_STATUS('RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC');
          "

          echo ""
          echo "=== Endpoint URLs ==="
          snow sql --connection retail -q "
            SHOW ENDPOINTS IN SERVICE RETAIL_ANALYZER.PUBLIC.RETAIL_ANALYZER_SVC;
          "
          echo ""
          echo "Copy the ingress_url values above into your .env file."
          echo "See .env.spcs.example for the format."

      - name: Clean up
        if: always()
        run: rm -f /tmp/snowflake_key.p8
