spec:
  containers:

    # ── Redis (shared message broker) ───────────────────────────
    - name: redis
      image: /retail_analyzer/images/repo/redis:7-alpine
      command:
        - redis-server
      resources:
        requests:
          cpu: "0.1"
          memory: "256M"
        limits:
          cpu: "0.5"
          memory: "512M"

    # ── Google Shopping ─────────────────────────────────────────
    - name: google-shopping-api
      image: /retail_analyzer/images/repo/google-shopping:latest
      command:
        - uvicorn
        - google_shopping.server:app
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
      env:
        REDIS_URL: redis://localhost:6379/0
        SNOWFLAKE_ACCOUNT: "<YOUR_SNOWFLAKE_ACCOUNT>"
        SNOWFLAKE_USER: "<YOUR_SNOWFLAKE_USER>"
        SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
        SNOWFLAKE_ROLE: "SYSADMIN"
      secrets:
        - snowflakeSecret: RETAIL_ANALYZER.PUBLIC.SNOWFLAKE_KEY
          secretKeyRef: secret_string
          envVarName: SNOWFLAKE_PRIVATE_KEY_B64
      resources:
        requests:
          cpu: "0.2"
          memory: "512M"
        limits:
          cpu: "1"
          memory: "1G"

    - name: google-shopping-worker
      image: /retail_analyzer/images/repo/google-shopping:latest
      command:
        - bash
        - -c
        - >-
          Xvfb :99 -screen 0 1280x900x24 -nolisten tcp -nolisten unix &
          sleep 1 &&
          export DISPLAY=:99 &&
          celery -A google_shopping.tasks worker
          --loglevel=info --concurrency=1 --pool=solo
          -Q google_shopping -n google_shopping@%h
      env:
        REDIS_URL: redis://localhost:6379/0
        SNOWFLAKE_ACCOUNT: "<YOUR_SNOWFLAKE_ACCOUNT>"
        SNOWFLAKE_USER: "<YOUR_SNOWFLAKE_USER>"
        SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
        SNOWFLAKE_ROLE: "SYSADMIN"
      secrets:
        - snowflakeSecret: RETAIL_ANALYZER.PUBLIC.SNOWFLAKE_KEY
          secretKeyRef: secret_string
          envVarName: SNOWFLAKE_PRIVATE_KEY_B64
      resources:
        requests:
          cpu: "0.5"
          memory: "2G"
        limits:
          cpu: "2"
          memory: "4G"

