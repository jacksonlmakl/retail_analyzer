services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Google Shopping ─────────────────────────────────────────

  google-shopping-api:
    build:
      context: .
      dockerfile: google_shopping/Dockerfile
    command: uvicorn google_shopping.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }

  google-shopping-worker:
    build:
      context: .
      dockerfile: google_shopping/Dockerfile
    command: >
      bash -c "
        Xvfb :99 -screen 0 1280x900x24 -nolisten tcp &
        sleep 1 &&
        export DISPLAY=:99 &&
        celery -A google_shopping.tasks worker --loglevel=info --concurrency=1 --pool=solo -Q google_shopping
      "
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }

